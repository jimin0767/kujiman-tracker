[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_KUJIMAN_API_BASE"

[[redirects]]
  from = "/kujiman-api/*"
  to = "https://api.kujiman.com/api_mini_apps/reward/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200